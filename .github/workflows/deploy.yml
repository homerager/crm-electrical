name: Deploy CRM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt
        run: npm run build:prod
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
          MAILGUN_URL: ${{ secrets.MAILGUN_URL }}

      - name: Backup .env on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            if [ ! -f /var/www/crm/crm-electrical/.env ]; then
              echo "ERROR: .env not found. Aborting deploy."
              exit 1
            fi
            cp /var/www/crm/crm-electrical/.env /tmp/crm-env-backup
            echo ".env backup OK ($(wc -c < /tmp/crm-env-backup) bytes)"

      - name: Copy build artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: '.output,prisma,package.json,package-lock.json'
          target: '/var/www/crm/crm-electrical'
          rm: true

      - name: Restore .env, migrate and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            if [ ! -f /tmp/crm-env-backup ]; then
              echo "ERROR: .env backup not found. Aborting."
              exit 1
            fi
            cp /tmp/crm-env-backup /var/www/crm/crm-electrical/.env
            cd /var/www/crm/crm-electrical
            npm ci --omit=dev --ignore-scripts
            npx prisma migrate deploy
            set -a && source .env && set +a
            pm2 stop crm-electrical || true
            pm2 delete crm-electrical || true
            pm2 start .output/server/index.mjs --name crm-electrical -- --port 3000
            pm2 save